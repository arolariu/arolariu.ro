# This docker compose will spin up the following management containers:
# - Traefik (Reverse Proxy) with mkcert HTTPS;
# - Healthchecks dashboard;
# - Network for external use (by other docker-compose files);
#
# HTTPS Setup (one-time):
#   1. Install mkcert: https://github.com/FiloSottile/mkcert#installation
#   2. Run: mkcert -install
#   3. Run: cd certs && mkcert -key-file local-key.pem -cert-file local-cert.pem "localhost" "*.localhost"
#   4. The certs/ directory is gitignored.

name: "arolariu-management"

networks:
  arolariu-network:
    name: "arolariu-network"
    driver: "bridge"
    attachable: true
    internal: false

services:
  traefik:
    image: "traefik:v3.0"
    container_name: "traefik"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - arolariu-network
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./traefik/dynamic:/etc/traefik/dynamic:ro"
      - "./certs:/certs:ro"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"

  healthchecks:
    image: linuxserver/healthchecks
    container_name: healthchecks
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SITE_ROOT=https://health.localhost
      - SITE_DOMAIN=localhost
      - SUPERUSER_EMAIL=admin@arolariu.ro
      - SUPERUSER_PASSWORD=admin1234
    volumes:
      - ./healthcheck:/config
    networks:
      - arolariu-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.healthchecks.rule=Host(`health.localhost`)"
      - "traefik.http.routers.healthchecks.entrypoints=websecure"
      - "traefik.http.services.healthchecks.loadbalancer.server.port=8000"
      - "traefik.http.routers.healthchecks.tls=true"