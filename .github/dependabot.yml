# =============================================================================
# Dependabot Configuration for arolariu.ro Monorepo
# =============================================================================
# This configuration manages automated dependency updates across the monorepo,
# including npm packages, NuGet packages, GitHub Actions, and Docker images.
#
# Update Policy:
#   - Target Branch: preview (all PRs target the preview branch)
#   - Update Types: MINOR and MAJOR only (patches are ignored)
#   - Grouping: Related packages are grouped to reduce PR noise
#
# Monorepo Structure:
#   /                        - Root (Nx, ESLint, Prettier, Vitest, Playwright)
#   /packages/components     - Shared React component library (RSLib, Storybook)
#   /sites/arolariu.ro       - Next.js 16 website (frontend)
#   /sites/api.arolariu.ro   - .NET 10 backend API (NuGet)
#   /sites/cv.arolariu.ro    - SvelteKit CV site
#   /sites/docs.arolariu.ro  - DocFX documentation (no npm)
#   /infra/containers        - Docker container definitions
#   /.github/scripts         - GitHub Actions toolkit scripts
#   /.github/workflows       - GitHub Actions workflows
#
# Schedule:
#   Sunday    - GitHub Actions
#   Monday    - Root npm dependencies
#   Tuesday   - Frontend (Next.js) + Components library
#   Wednesday - CV site (SvelteKit)
#   Thursday  - Backend (.NET/NuGet)
#   Friday    - Docker images + CI scripts
#
# Documentation:
#   https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
# =============================================================================

version: 2

updates:
  # ===========================================================================
  # GITHUB ACTIONS WORKFLOWS
  # ===========================================================================
  # Keep GitHub Actions workflows up to date for security and features.
  # Scans: /.github/workflows/*.yml and /.github/actions/*/action.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "preview"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:00"
      timezone: "Europe/Bucharest"
    commit-message:
      prefix: "ci(actions)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    assignees:
      - "arolariu"
    open-pull-requests-limit: 5
    ignore:
      # Only update minors and majors, not patches
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      # Group all GitHub Actions minor/major updates together
      github-actions-all:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "major"

  # ===========================================================================
  # ROOT NPM DEPENDENCIES
  # ===========================================================================
  # Monorepo root: Nx, ESLint, Prettier, TypeScript, Vitest, Playwright
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "preview"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Bucharest"
    commit-message:
      prefix: "chore(root-deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "monorepo-root"
      - "automated"
    assignees:
      - "arolariu"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    ignore:
      # Only update minors and majors, not patches
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # ESLint ecosystem (20+ plugins configured)
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "@stylistic/*"
        update-types:
          - "minor"
          - "major"
      # Prettier and formatting plugins
      prettier:
        patterns:
          - "prettier"
          - "prettier-*"
          - "@trivago/*"
        update-types:
          - "minor"
          - "major"
      # Nx monorepo tooling
      nx:
        patterns:
          - "nx"
          - "@nx/*"
        update-types:
          - "minor"
          - "major"
      # TypeScript and type definitions
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
        update-types:
          - "minor"
          - "major"
      # Testing: Vitest (unit) + Playwright (E2E)
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "playwright"
          - "@playwright/*"
        update-types:
          - "minor"
          - "major"

  # ===========================================================================
  # FRONTEND - NEXT.JS 16 WEBSITE
  # ===========================================================================
  # Main website: Next.js 16, React 19, Sass/CSS Modules, Clerk, OpenTelemetry
  - package-ecosystem: "npm"
    directory: "/sites/arolariu.ro"
    target-branch: "preview"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "Europe/Bucharest"
    commit-message:
      prefix: "chore(frontend)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
      - "automated"
    assignees:
      - "arolariu"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    ignore:
      # Only update minors and majors, not patches
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # Next.js and React core
      nextjs-react:
        patterns:
          - "next"
          - "next-*"
          - "react"
          - "react-dom"
          - "@next/*"
        update-types:
          - "minor"
          - "major"
      # Radix UI primitives (shadcn/ui foundation)
      radix:
        patterns:
          - "@radix-ui/*"
        update-types:
          - "minor"
          - "major"
      # Clerk authentication
      clerk:
        patterns:
          - "@clerk/*"
        update-types:
          - "minor"
          - "major"
      # OpenTelemetry observability stack
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
        update-types:
          - "minor"
          - "major"
      # Forms: react-hook-form + zod validation
      forms:
        patterns:
          - "react-hook-form"
          - "zod"
          - "@hookform/*"
        update-types:
          - "minor"
          - "major"
      # Internationalization with next-intl
      i18n:
        patterns:
          - "next-intl"
          - "@formatjs/*"
        update-types:
          - "minor"
          - "major"
      # Azure SDKs for storage, config, etc.
      azure-sdk:
        patterns:
          - "@azure/*"
        update-types:
          - "minor"
          - "major"
      # State management: Zustand
      state:
        patterns:
          - "zustand"
        update-types:
          - "minor"
          - "major"

  # ===========================================================================
  # SHARED COMPONENTS LIBRARY
  # ===========================================================================
  # packages/components: RSLib build, Storybook docs, shadcn/ui components
  - package-ecosystem: "npm"
    directory: "/packages/components"
    target-branch: "preview"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:00"
      timezone: "Europe/Bucharest"
    commit-message:
      prefix: "chore(components)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "components"
      - "automated"
    assignees:
      - "arolariu"
    open-pull-requests-limit: 5
    versioning-strategy: increase
    ignore:
      # Only update minors and majors, not patches
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # Storybook documentation platform
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
          - "@chromatic-com/*"
        update-types:
          - "minor"
          - "major"
      # RSLib/Rsbuild build tooling
      rslib:
        patterns:
          - "@rslib/*"
          - "@rsbuild/*"
        update-types:
          - "minor"
          - "major"
      # UI utilities (CVA, clsx)
      ui-utils:
        patterns:
          - "@radix-ui/*"
          - "class-variance-authority"
          - "clsx"
        update-types:
          - "minor"
          - "major"

  # ===========================================================================
  # CV SITE - SVELTEKIT
  # ===========================================================================
  # Static CV/resume site built with SvelteKit + Azure SWA adapter
  - package-ecosystem: "npm"
    directory: "/sites/cv.arolariu.ro"
    target-branch: "preview"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "Europe/Bucharest"
    commit-message:
      prefix: "chore(cv)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "cv-site"
      - "automated"
    assignees:
      - "arolariu"
    open-pull-requests-limit: 5
    versioning-strategy: increase
    ignore:
      # Only update minors and majors, not patches
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # SvelteKit framework and adapters
      svelte:
        patterns:
          - "svelte"
          - "@sveltejs/*"
          - "svelte-*"
        update-types:
          - "minor"
          - "major"

  # ===========================================================================
  # BACKEND - .NET 10 API
  # ===========================================================================
  # Modular monolith API: Microsoft, Azure SDK, OpenTelemetry, xUnit
  - package-ecosystem: "nuget"
    directory: "/sites/api.arolariu.ro"
    target-branch: "preview"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:00"
      timezone: "Europe/Bucharest"
    commit-message:
      prefix: "chore(backend)"
      include: "scope"
    labels:
      - "dependencies"
      - "nuget"
      - "backend"
      - "automated"
    assignees:
      - "arolariu"
    open-pull-requests-limit: 10
    ignore:
      # Only update minors and majors, not patches
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      # Microsoft.Extensions.* and System.* packages
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"
        update-types:
          - "minor"
          - "major"
      # Azure SDK for .NET
      azure:
        patterns:
          - "Azure.*"
        update-types:
          - "minor"
          - "major"
      # OpenTelemetry for observability
      opentelemetry:
        patterns:
          - "OpenTelemetry*"
        update-types:
          - "minor"
          - "major"
      # Testing: xUnit, FluentAssertions, Coverlet
      testing:
        patterns:
          - "xunit*"
          - "Moq*"
          - "FluentAssertions*"
          - "coverlet*"
        update-types:
          - "minor"
          - "major"

  # ===========================================================================
  # DOCKER IMAGES - INFRASTRUCTURE CONTAINERS
  # ===========================================================================
  # Container definitions in /infra/containers (backend, frontend, cv)
  - package-ecosystem: "docker"
    directory: "/infra/containers"
    target-branch: "preview"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
      timezone: "Europe/Bucharest"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "infrastructure"
      - "automated"
    assignees:
      - "arolariu"
    open-pull-requests-limit: 3
    ignore:
      # Only update minors and majors, not patches
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  # ===========================================================================
  # DOCKER IMAGES - FRONTEND DOCKERFILE
  # ===========================================================================
  # Standalone Dockerfile in sites/arolariu.ro
  - package-ecosystem: "docker"
    directory: "/sites/arolariu.ro"
    target-branch: "preview"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:30"
      timezone: "Europe/Bucharest"
    commit-message:
      prefix: "chore(docker-frontend)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "frontend"
      - "automated"
    assignees:
      - "arolariu"
    open-pull-requests-limit: 2
    ignore:
      # Only update minors and majors, not patches
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  # ===========================================================================
  # DOCKER IMAGES - BACKEND DOCKERFILE
  # ===========================================================================
  # Standalone Dockerfile in sites/api.arolariu.ro
  - package-ecosystem: "docker"
    directory: "/sites/api.arolariu.ro"
    target-branch: "preview"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "07:00"
      timezone: "Europe/Bucharest"
    commit-message:
      prefix: "chore(docker-backend)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "backend"
      - "automated"
    assignees:
      - "arolariu"
    open-pull-requests-limit: 2
    ignore:
      # Only update minors and majors, not patches
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  # ===========================================================================
  # GITHUB ACTIONS CI SCRIPTS
  # ===========================================================================
  # TypeScript scripts using @actions/* toolkit packages
  - package-ecosystem: "npm"
    directory: "/.github/scripts"
    target-branch: "preview"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "08:00"
      timezone: "Europe/Bucharest"
    commit-message:
      prefix: "ci(scripts)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
      - "ci"
      - "automated"
    assignees:
      - "arolariu"
    open-pull-requests-limit: 3
    versioning-strategy: increase
    ignore:
      # Only update minors and majors, not patches
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # GitHub Actions toolkit packages
      actions-toolkit:
        patterns:
          - "@actions/*"
        update-types:
          - "minor"
          - "major"
      # TypeScript and testing
      dev-tools:
        patterns:
          - "typescript"
          - "@types/*"
          - "vitest"
          - "@vitest/*"
        update-types:
          - "minor"
          - "major"
