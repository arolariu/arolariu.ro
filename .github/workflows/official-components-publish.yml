# =============================================================================
# NPM Package Publishing Workflow for @arolariu/components
# =============================================================================
# This workflow publishes the @arolariu/components package to npm registry
# using Trusted Publishing (OIDC) for secure, tokenless authentication.
#
# Features:
#   - Trusted Publishing via OIDC (no long-lived npm tokens required)
#   - Automatic provenance attestations for supply chain security
#   - Version validation before publish
#   - Comprehensive testing before release
#
# Prerequisites:
#   1. Configure Trusted Publisher on npmjs.com:
#      - Organization: arolariu
#      - Repository: arolariu.ro
#      - Workflow filename: official-components-publish.yml
#      - Environment name: npm-publish (optional but recommended)
#
# Documentation:
#   - https://docs.npmjs.com/trusted-publishers
#   - https://docs.npmjs.com/generating-provenance-statements
# =============================================================================

name: "official-components-publish"

permissions:
  id-token: write # Required for OIDC authentication with npm
  contents: read # Required to checkout repository
  attestations: write # Required for provenance attestations

on:
  # Manual trigger for controlled releases
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Perform a dry run (no actual publish)"
        required: false
        default: false
        type: boolean
      tag:
        description: "NPM distribution tag (e.g., 'latest', 'beta', 'next')"
        required: false
        default: "latest"
        type: choice
        options:
          - "latest"
          - "beta"
          - "next"
          - "canary"
  # Automatic trigger on version tag pushes
  push:
    tags:
      - "components-v*" # e.g., components-v0.3.2

defaults:
  run:
    working-directory: ./packages/components

env:
  NODE_VERSION: "24"
  PACKAGE_PATH: "packages/components"

jobs:
  # ===========================================================================
  # VALIDATION JOB
  # ===========================================================================
  # Validates the package before publishing
  validate:
    name: 🔍 Validate Package
    runs-on: ubuntu-latest
    if: github.repository == 'arolariu/arolariu.ro'
    outputs:
      version: ${{ steps.package-info.outputs.version }}
      name: ${{ steps.package-info.outputs.name }}
    steps:
      - name: � Display workflow context
        run: |
          echo "::group::🔍 Publish Context"
          echo "┌────────────────────────────────────────────────────────────┐"
          echo "│ 📦 NPM PACKAGE PUBLISH PIPELINE                            │"
          echo "├────────────────────────────────────────────────────────────┤"
          echo "│ 📦 Package:       @arolariu/components                     │"
          echo "│ 🏷️ Tag:          ${{ inputs.tag || 'latest' }}"
          echo "│ 🔐 Auth:          Trusted Publishing (OIDC)                │"
          echo "│ 🧪 Dry Run:       ${{ inputs.dry-run || 'false' }}"
          echo "│ 📅 Timestamp:     $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "│ 👤 Triggered by:  ${{ github.actor }}"
          echo "│ 🔗 Run ID:        ${{ github.run_id }}"
          echo "└────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

          # Write initial summary
          echo "## 📦 NPM Package Publish" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | \`@arolariu/components\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Distribution Tag | ${{ inputs.tag || 'latest' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ inputs.dry-run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Authentication | OIDC Trusted Publishing |" >> $GITHUB_STEP_SUMMARY

      - name: �🛫 Checkout repository
        uses: actions/checkout@v6

      - name: 📦 Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}
          dotnet-version: ""
          cache-key-prefix: "components"

      - name: 📋 Extract package information
        id: package-info
        run: |
          echo "::group::📋 Package Information"
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "::notice::Package: $NAME@$VERSION"

          echo "┌────────────────────────────────────────────────────────────┐"
          echo "│ 📦 PACKAGE DETAILS                                         │"
          echo "├────────────────────────────────────────────────────────────┤"
          echo "│ Name:    $NAME"
          echo "│ Version: $VERSION"
          echo "└────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Package Details" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Name | \`$NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Check if version already published
        run: |
          VERSION="${{ steps.package-info.outputs.version }}"
          NAME="${{ steps.package-info.outputs.name }}"

          echo "::group::🔍 Version Check"
          echo "Checking npm registry for $NAME@$VERSION..."

          # Check if this version already exists on npm
          if npm view "$NAME@$VERSION" version 2>/dev/null; then
            echo "::error::Version $VERSION is already published on npm!"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ Version Conflict" >> $GITHUB_STEP_SUMMARY
            echo "Version \`$VERSION\` is already published on npm." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "::notice::Version $VERSION is not yet published. Ready to proceed."
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ✅ Version Available" >> $GITHUB_STEP_SUMMARY
            echo "Version \`$VERSION\` is not yet published. Ready to proceed." >> $GITHUB_STEP_SUMMARY
          fi
          echo "::endgroup::"

      - name: 🏗️ Build package
        run: |
          echo "::group::🏗️ Building Package"
          START_TIME=$(date +%s)
          npm run build
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "::notice::✅ Build completed in ${DURATION}s"
          echo "::endgroup::"

      - name: 🧪 Run tests
        run: |
          echo "::group::🧪 Running Tests"
          npm run test --if-present
          echo "::endgroup::"

      - name: 📦 Verify package contents
        run: |
          echo "::group::📦 Package Contents"
          npm pack --dry-run
          echo "::endgroup::"

  # ===========================================================================
  # PUBLISH JOB
  # ===========================================================================
  # Publishes the package to npm with trusted publishing
  publish:
    name: 🚀 Publish to npm
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/${{ needs.validate.outputs.name }}
    steps:
      - name: � Display publish context
        run: |
          echo "::group::🔍 Publish Context"
          echo "┌────────────────────────────────────────────────────────────┐"
          echo "│ 🚀 PUBLISH PHASE                                           │"
          echo "├────────────────────────────────────────────────────────────┤"
          echo "│ 📦 Package:       ${{ needs.validate.outputs.name }}@${{ needs.validate.outputs.version }}"
          echo "│ 🏷️ Tag:          ${{ inputs.tag || 'latest' }}"
          echo "│ 🔐 Auth:          Trusted Publishing (OIDC)"
          echo "│ 📅 Timestamp:     $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "└────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

      - name: �🛫 Checkout repository
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js with npm registry
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      # Ensure npm CLI is new enough for trusted publishing (11.5.1+)
      - name: 🔄 Update npm to latest
        run: npm install -g npm@latest

      - name: 📥 Install dependencies
        run: npm ci
        working-directory: .

      - name: 🏗️ Build package
        run: npm run build

      - name: 📋 Display package info
        run: |
          echo "📦 Publishing ${{ needs.validate.outputs.name }}@${{ needs.validate.outputs.version }}"
          echo "📁 Package contents:"
          npm pack --dry-run
          echo ""
          echo "🏷️ Distribution tag: ${{ inputs.tag || 'latest' }}"
          echo "🔐 Authentication: Trusted Publishing (OIDC)"

      - name: 🚀 Publish to npm (Dry Run)
        if: inputs.dry-run == true
        run: |
          echo "::notice::🔍 DRY RUN - Package would be published as:"
          echo "  Name: ${{ needs.validate.outputs.name }}"
          echo "  Version: ${{ needs.validate.outputs.version }}"
          echo "  Tag: ${{ inputs.tag || 'latest' }}"
          npm publish --dry-run --tag ${{ inputs.tag || 'latest' }}

      - name: 🚀 Publish to npm
        if: inputs.dry-run != true
        run: npm publish --provenance --tag ${{ inputs.tag || 'latest' }} --access public
        # Note: No NODE_AUTH_TOKEN needed - using Trusted Publishing (OIDC)
        # Provenance is now explicitly generated via --provenance flag

      - name: ✅ Publish confirmation
        if: inputs.dry-run != true
        run: |
          echo "::notice::✅ Successfully published ${{ needs.validate.outputs.name }}@${{ needs.validate.outputs.version }}"
          echo ""
          echo "📦 View on npm: https://www.npmjs.com/package/${{ needs.validate.outputs.name }}"
          echo "🔐 Provenance: Automatically attached via Trusted Publishing"
          echo ""
          echo "To verify provenance, run:"
          echo "  npm audit signatures"
