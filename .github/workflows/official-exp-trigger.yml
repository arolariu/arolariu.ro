# =============================================================================
# Experiments Service Build and Deployment Workflow
# =============================================================================
# This workflow handles the CI/CD pipeline for the Python Azure Functions service
# (experiments.arolariu.ro), including testing, containerization, and Azure deployment.
#
# Architecture:
#   - Phase 1: Test - Runs pytest to validate code quality
#   - Phase 2: Build - Containerizes the Python Functions app using Docker
#   - Phase 3: Deploy - Pushes container to ACR and deploys to Azure Function App
#
# Triggers:
#   - Automatic: Push to 'main' branch with changes in sites/experiments.arolariu.ro/
#   - Manual: workflow_dispatch with environment and infrastructure selection
#
# Security:
#   - Uses OIDC (OpenID Connect) for Azure authentication (no long-lived secrets)
#   - Azure Container Registry auth via OIDC (no admin credentials)
#   - Federated identity via Azure Managed Identity
#
# Prerequisites:
#   1. Azure Managed Identity configured with Federated Credentials
#   2. Azure Container Registry with push/pull access
#   3. Azure Function App configured for container deployment
#   4. GitHub Secrets configured:
#      - AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#      - AZURE_BACKEND_MANAGED_IDENTITY_CLIENT_ID
#      - AZURE_CONTAINER_REGISTRY_ADDRESS
# =============================================================================

name: "official-exp-trigger"

permissions:
  id-token: write # Required for OIDC authentication with Azure
  contents: read # Required to checkout repository

defaults:
  run:
    working-directory: ./sites/experiments.arolariu.ro

on:
  # Automatic trigger on main branch changes to experiments service
  push:
    branches: ["main"]
    paths: ["sites/experiments.arolariu.ro/**"]

  # Manual trigger for controlled deployments
  workflow_dispatch:
    inputs:
      environment:
        description: "The environment to deploy to. (e.g. 'development', 'production')"
        options:
          - "development"
          - "production"
        default: "production"
        required: true
        type: choice
      infrastructure:
        description: "The infrastructure where it will be deployed (e.g. 'local' or 'azure')"
        options:
          - 'local'
          - 'azure'
        default: "azure"
        required: true
        type: choice

env:
  COMMIT_SHA: ${{ github.sha }}
  INFRA: ${{ inputs.infrastructure || 'azure' }}
  AZURE_TENANT_ID: ${{secrets.AZURE_TENANT_ID}}
  AZURE_SUBSCRIPTION_ID: ${{secrets.AZURE_SUBSCRIPTION_ID}}
  AZURE_CLIENT_ID: ${{secrets.AZURE_BACKEND_MANAGED_IDENTITY_CLIENT_ID}}

jobs:
  test:
    if: github.repository == 'arolariu/arolariu.ro'
    name: 🧪 Test phase (1/3)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    timeout-minutes: 10
    steps:
      - name: 🛫 Checking out the branch inside the runner environment...
        uses: actions/checkout@v6

      - name: 📝 Display workflow context
        run: |
          echo "::group::🔍 Workflow Context"
          echo "┌────────────────────────────────────────────────────────────┐"
          echo "│ 🎯 EXPERIMENTS SERVICE CI/CD PIPELINE                      │"
          echo "├────────────────────────────────────────────────────────────┤"
          echo "│ 📦 Job:           Test phase (1/3)                         │"
          echo "│ 🌍 Environment:   ${{ inputs.environment || 'production' }}"
          echo "│ 🔧 Infrastructure: ${{ env.INFRA }}"
          echo "│ 🏷️ Commit SHA:    ${{ github.sha }}"
          echo "│ 👤 Triggered by:  ${{ github.actor }}"
          echo "│ 📅 Timestamp:     $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "└────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'sites/experiments.arolariu.ro/requirements.txt'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: 🧪 Running unit tests...
        env:
          INFRA: local
        run: |
          echo "::group::🧪 Running Python Tests"
          START_TIME=$(date +%s)
          python -m pytest tests/ -v --tb=short
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "::notice::✅ Tests completed in ${DURATION}s"
          echo "::endgroup::"

          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | pytest |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | 3.12 |" >> $GITHUB_STEP_SUMMARY

  build:
    if: github.repository == 'arolariu/arolariu.ro'
    name: 🛠️ Build phase (2/3)
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - name: 🛫 Checking out the branch inside the runner environment...
        uses: actions/checkout@v6

      - name: 📝 Display build context
        run: |
          echo "::group::🔍 Build Context"
          echo "┌────────────────────────────────────────────────────────────┐"
          echo "│ 🏗️ BUILD PHASE                                            │"
          echo "├────────────────────────────────────────────────────────────┤"
          echo "│ 📦 Job:           Build phase (2/3)                        │"
          echo "│ 🐳 Container:     experiments/experiments.arolariu         │"
          echo "│ 🏷️ Tag:          ${{ inputs.environment == 'production' && github.sha || 'latest' }}"
          echo "│ 🌍 Environment:   ${{ inputs.environment || 'production' }}"
          echo "│ 📅 Timestamp:     $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "└────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

      - name: 🔒 Performing auth against Azure Public Cloud...
        uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🔒 Performing auth against private Azure Container Registry...
        working-directory: '.'
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"
        env:
          ACR_LOGIN_SERVER: ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}

      - name: 🏗️ Building the docker container...
        env:
          CONTAINER_NAME: "experiments/experiments.arolariu"
          CONTAINER_TAG: ${{ inputs.environment == 'production' && github.sha || 'latest' }}
        run: |
          echo "::group::🐳 Docker Build"
          START_TIME=$(date +%s)
          docker build \
            -t ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}/${{env.CONTAINER_NAME}}:${{env.CONTAINER_TAG}} \
            .
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "::notice::✅ Docker build completed in ${DURATION}s"
          echo "::endgroup::"

          IMAGE_SIZE=$(docker images --format "{{.Size}}" ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}/${{env.CONTAINER_NAME}}:${{env.CONTAINER_TAG}})

          echo "## 🐳 Docker Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Size | ${IMAGE_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container | \`${{env.CONTAINER_NAME}}:${{env.CONTAINER_TAG}}\` |" >> $GITHUB_STEP_SUMMARY

      - name: ⏫ Pushing the docker container...
        env:
          CONTAINER_NAME: "experiments/experiments.arolariu"
          CONTAINER_TAG: ${{ inputs.environment == 'production' && github.sha || 'latest' }}
        run: |
          echo "::group::⏫ Docker Push"
          echo "📤 Pushing to Azure Container Registry..."
          START_TIME=$(date +%s)
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}/${{env.CONTAINER_NAME}}:${{env.CONTAINER_TAG}}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "::notice::✅ Docker push completed in ${DURATION}s"
          echo "::endgroup::"

  deploy:
    if: github.repository == 'arolariu/arolariu.ro'
    name: 🚀 Deploy phase (3/3)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: ${{ steps.deploy-to-functionapp.outputs.webapp-url }}

    steps:
      - name: 🔒 Handling the auth process to Azure Public Cloud...
        uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🔒 Performing auth against private Azure Container Registry...
        working-directory: '.'
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"
        env:
          ACR_LOGIN_SERVER: ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}

      - name: ⚓ Deploying docker container to Azure Function App...
        id: deploy-to-functionapp
        uses: azure/webapps-deploy@v3
        env:
          CONTAINER_NAME: "experiments/experiments.arolariu"
          CONTAINER_TAG: ${{ inputs.environment == 'production' && github.sha || 'latest' }}
        with:
          app-name: "experiments-arolariu-ro"
          images: "${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}/${{env.CONTAINER_NAME}}:${{env.CONTAINER_TAG}}"
