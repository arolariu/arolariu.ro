# =============================================================================
# Experiments Service Build and Deployment Workflow
# =============================================================================
# Runs reusable Python quality checks, builds an immutable FastAPI container
# image, and deploys that exact digest/tag to Azure App Service.
# =============================================================================

name: "official-exp-trigger"

permissions:
  attestations: write # Required for container provenance attestations
  contents: read # Required to checkout repository
  id-token: write # Required for OIDC authentication with Azure

on:
  push:
    branches: ["main"]
    paths:
      - "sites/exp.arolariu.ro/**"
      - "infra/containers/Dockerfile.exp"
      - ".github/actions/azure-container-build-push/**"
      - ".github/actions/azure-webapp-container-deploy/**"
      - ".github/workflows/official-exp-trigger.yml"
      - ".github/workflows/reusable-python-quality.yml"
      - ".github/workflows/reusable-container-build-push.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "The environment to deploy to."
        options:
          - "development"
          - "production"
        default: "production"
        required: true
        type: choice
      infrastructure:
        description: "The infrastructure where it will be deployed."
        options:
          - "local"
          - "azure"
        default: "azure"
        required: true
        type: choice

jobs:
  test:
    name: 🧪 Exp quality
    if: github.repository == 'arolariu/arolariu.ro'
    uses: ./.github/workflows/reusable-python-quality.yml
    with:
      project-name: "Exp"
      working-directory: "sites/exp.arolariu.ro"

  build:
    name: 🐳 Exp image
    if: github.repository == 'arolariu/arolariu.ro'
    needs: test
    uses: ./.github/workflows/reusable-container-build-push.yml
    with:
      image-name: "exp/exp.arolariu"
      dockerfile: "infra/containers/Dockerfile.exp"
      context: "."
      build-args: |
        COMMIT_SHA=${{ github.sha }}
        INFRA=${{ inputs.infrastructure || 'azure' }}
      environment-name: ${{ inputs.environment || 'production' }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_BACKEND_MANAGED_IDENTITY_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}

  deploy:
    name: 🚀 Exp deploy
    if: github.repository == 'arolariu/arolariu.ro'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: ${{ steps.deploy-to-webapp.outputs.url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: ⚓ Deploy Exp container
        id: deploy-to-webapp
        uses: ./.github/actions/azure-webapp-container-deploy
        with:
          app-name: "exp-arolariu-ro"
          registry: ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}
          image-name: "exp/exp.arolariu"
          image-digest: ${{ needs.build.outputs.digest }}
          image-tag: ${{ github.sha }}
          azure-client-id: ${{ secrets.AZURE_BACKEND_MANAGED_IDENTITY_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🏷️ Set COMMIT_SHA app setting
        run: |
          az webapp config appsettings set \
            --name exp-arolariu-ro \
            --resource-group arolariu-rg \
            --settings COMMIT_SHA=${{ github.sha }} \
            --output none
