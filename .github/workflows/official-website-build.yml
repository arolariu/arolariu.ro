# =============================================================================
# Main Website Build Workflow (Development/Preview)
# =============================================================================
# This workflow handles the CI/CD pipeline for the main Next.js website
# (arolariu.ro) in development/preview environments, including testing,
# containerization, and deployment to development Azure App Service.
#
# Architecture:
#   - Phase 1: Test - Unit tests (Vitest) and E2E tests (Playwright)
#   - Phase 2: Build - Containerizes Next.js app and pushes to ACR
#
# Technology Stack:
#   - Next.js 16.1.6 (App Router, React Server Components)
#   - React 19.2.4 with TypeScript 5.9.3 (strict mode)
#   - Playwright for E2E testing
#   - Vitest for unit testing
#   - Docker for containerization
#
# Triggers:
#   - Automatic: Push to 'preview' branch with changes in sites/arolariu.ro/
#   - Manual: workflow_dispatch with environment/infrastructure selection
#
# Test Coverage:
#   - Unit tests with code coverage (uploaded to CodeCov)
#   - E2E tests with Playwright
#   - Test reports uploaded as artifacts
#   - PR comments with test results (on preview branch)
#
# Security:
#   - Uses OIDC for Azure authentication (no long-lived secrets)
#   - Azure Container Registry credentials in GitHub Secrets
#   - Environment-specific configurations
#
# Prerequisites:
#   1. Azure Managed Identity configured with Federated Credentials
#   2. Azure Container Registry with push/pull access
#   3. GitHub Secrets configured:
#      - AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#      - AZURE_FRONTEND_MANAGED_IDENTITY_CLIENT_ID
#      - AZURE_CONTAINER_REGISTRY_ADDRESS
#      - CODECOV_TOKEN (for coverage reporting)
#
# Related Workflows:
#   - official-website-release.yml: Deploys built container to Azure
# =============================================================================

name: "official-website-build"

permissions:
  id-token: write # Required for OIDC authentication with Azure
  contents: read # Required to checkout repository
  issues: write # Required for PR comments on test results
  pull-requests: write # Required for PR comments on test results

defaults:
  run:
    working-directory: ./sites/arolariu.ro

on:
  # Automatic trigger on preview branch changes to main website
  push:
    branches: ["preview"]
    paths: ["sites/arolariu.ro/**"]

  # Manual trigger for controlled builds
  workflow_dispatch:
    inputs:
      environment:
        description: "The environment to deploy to. (e.g. 'development', 'production')"
        options:
          - "development"
          - "production"
        default: "development"
        required: true
        type: choice
      infrastructure:
        description: "The infrastructure where it will be deployed (e.g. 'local' or 'azure')"
        options:
          - 'local'
          - 'azure'
        default: "azure"
        required: true
        type: choice
      container_name:
        description: "The name of the container to build and deploy. (e.g. 'frontend/dev.arolariu', 'frontend/arolariu')"
        options:
          - "frontend/dev.arolariu"
          - "frontend/arolariu"
        default: "frontend/dev.arolariu"
        required: true
        type: choice
      skip_tests:
        description: "Skip the test phase? (true/false)"
        type: boolean
        default: false
        required: false

env:
  COMMIT_SHA: ${{ github.sha }}
  PRODUCTION: ${{ inputs.environment == 'production' && 'true' || 'false' }}
  INFRA: ${{ inputs.infrastructure || 'azure' }}
  AZURE_TENANT_ID: ${{secrets.AZURE_TENANT_ID}}
  AZURE_SUBSCRIPTION_ID: ${{secrets.AZURE_SUBSCRIPTION_ID}}
  AZURE_CLIENT_ID: ${{secrets.AZURE_FRONTEND_MANAGED_IDENTITY_CLIENT_ID}}
  # Build-time injections: inlined by next.config.ts env block (SITE_*)
  # These must be present when `npm run build` executes inside the Docker builder stage.
  SITE_ENV: ${{ inputs.environment == 'production' && 'PRODUCTION' || 'DEVELOPMENT' }}
  SITE_NAME: ${{ inputs.environment == 'production' && 'arolariu.ro' || 'dev.arolariu.ro' }}
  SITE_URL: ${{ inputs.environment == 'production' && 'https://arolariu.ro' || 'https://dev.arolariu.ro' }}

jobs:
  test:
    if: github.repository == 'arolariu/arolariu.ro' && inputs.skip_tests != true
    name: 🧪 Test phase (1/2)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'development'}}
    timeout-minutes: 25
    steps:
      - name: 🛫 Checking out the branch inside the runner environment...
        uses: actions/checkout@v6

      - name: 📝 Display workflow context
        run: |
          echo "::group::🔍 Workflow Context"
          echo "┌────────────────────────────────────────────────────────────┐"
          echo "│ 🌐 WEBSITE CI/CD PIPELINE                                  │"
          echo "├────────────────────────────────────────────────────────────┤"
          echo "│ 📦 Job:           Test phase (1/2)                         │"
          echo "│ 🌍 Environment:   ${{ inputs.environment || 'development' }}"
          echo "│ 🔧 Infrastructure: ${{ env.INFRA }}"
          echo "│ 🏷️ Commit SHA:    ${{ github.sha }}"
          echo "│ 👤 Triggered by:  ${{ github.actor }}"
          echo "│ 📅 Timestamp:     $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "│ 🔗 Run ID:        ${{ github.run_id }}"
          echo "│ 🔢 Run Number:    ${{ github.run_number }}"
          echo "│ 🧪 Skip Tests:    ${{ inputs.skip_tests || 'false' }}"
          echo "└────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

      - name: 🔒 Performing auth against Azure Public Cloud...
        uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 📦 Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: '24'
          playwright: 'true'
          generate: 'true'
          cache-key-prefix: 'website'

      - name: 🧪 Running unit tests...
        working-directory: './sites/arolariu.ro'
        run: |
          echo "::group::🧪 Running Vitest Unit Tests"
          echo "📍 Framework: Vitest"
          echo "📍 Coverage: Enabled"
          echo ""
          START_TIME=$(date +%s)
          npm run test:unit
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo ""
          echo "::notice::✅ Unit tests completed in ${DURATION}s"
          echo "::endgroup::"

          echo "## 🧪 Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Vitest |" >> $GITHUB_STEP_SUMMARY
        env: # We will use local assets for the tests
          USE_CDN: "false"

      - name: 🧪 Running E2E tests...
        working-directory: './sites/arolariu.ro'
        run: |
          echo "::group::🎭 Running Playwright E2E Tests"
          echo "📍 Framework: Playwright"
          echo "📍 Browsers: Chromium, Firefox, WebKit"
          echo ""
          START_TIME=$(date +%s)
          npm run test:e2e
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo ""
          echo "::notice::✅ E2E tests completed in ${DURATION}s"
          echo "::endgroup::"

          echo "## 🎭 E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Playwright |" >> $GITHUB_STEP_SUMMARY
        env: # We will use local assets for the tests
          USE_CDN: "false"

      - name: 📤 Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-report-${{ inputs.environment || 'development' }}-${{ github.run_id }}
          path: sites/arolariu.ro/code-cov/
          if-no-files-found: error
          retention-days: 7

      - name: 💬 Create PR Comment
        uses: actions/github-script@v8
        if: github.event_name == 'push' && github.ref == 'refs/heads/preview'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          BRANCH_NAME: ${{ github.ref_name }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Install dependencies required by the script
            const { execSync } = require('child_process');
            execSync('cd .github/scripts && npm ci', { stdio: 'inherit' });

            // Import and execute the unified unit test action script
            const { default: runUnitTestAction } = await import('${{ github.workspace }}/.github/scripts/src/runUnitTestAction.ts');
            await runUnitTestAction();

      - name: ☂️ Uploading code coverage report to CodeCov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: "sites/arolariu.ro/code-cov"

  build:
    if: "!cancelled() && github.repository == 'arolariu/arolariu.ro' && (needs.test.result == 'success' || needs.test.result == 'skipped')"
    name: ⚒️ Build phase (2/2)
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'development'}}
    steps:
      - name: 🛫 Checking out the branch inside the runner environment...
        uses: actions/checkout@v6

      - name: 📋 Display build context
        run: |
          echo "::group::🔍 Build Context"
          echo "┌────────────────────────────────────────────────────────────┐"
          echo "│ 🏗️ WEBSITE BUILD PHASE                                    │"
          echo "├────────────────────────────────────────────────────────────┤"
          echo "│ 📦 Job:           Build phase (2/2)                        │"
          echo "│ 🐳 Container:     ${{ inputs.container_name || 'frontend/dev.arolariu' }}"
          echo "│ 🏷️ Tag:          ${{ inputs.environment == 'production' && github.sha || 'latest' }}"
          echo "│ 🌍 Environment:   ${{ inputs.environment || 'development' }}"
          echo "│ 📅 Timestamp:     $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "│ 🧪 Tests:         ${{ needs.test.result }}"
          echo "└────────────────────────────────────────────────────────────┘"
          echo "::endgroup::"

      - name: ⚠️ Test Skip Warning
        if: inputs.skip_tests == true
        run: |
          echo "::warning::Tests were skipped for this build (run ${{ github.run_id }})"
          echo "::warning::Environment: ${{ inputs.environment || 'development' }}"
          echo "::warning::Triggered by: ${{ github.actor }}"

      - name: 🔒 Performing auth against Azure Public Cloud...
        uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 📦 Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: '24'
          generate: 'true'
          cache-key-prefix: 'website'

      - name: 🔒 Performing auth against private Azure Container Registry...
        working-directory: '.'
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"
        env:
          ACR_LOGIN_SERVER: ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}

      - name: 📋 Verify generated .env file exists
        run: |
          if [ -f "sites/arolariu.ro/.env" ]; then
            echo "✅ .env file found"
          else
            echo "❌ .env file not found - build will likely fail"
            exit 1
          fi
        shell: bash
        working-directory: '.'

      - name: 🏗️ Building the docker container...
        working-directory: '.'
        env:
          CONTAINER_NAME: ${{inputs.container_name || 'frontend/dev.arolariu'}}
          CONTAINER_TAG: ${{inputs.environment == 'production' && github.sha || 'latest'}}
        run: |
          echo "::group::🐳 Docker Build"
          echo "┌────────────────────────────────────────────────────────────┐"
          echo "│ 🐳 DOCKER BUILD STARTED                                    │"
          echo "├────────────────────────────────────────────────────────────┤"
          echo "│ 📦 Image: ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}/${{env.CONTAINER_NAME}}:${{env.CONTAINER_TAG}}"
          echo "│ 📁 Dockerfile: infra/containers/Dockerfile.frontend"
          echo "│ 🔧 Build args:"
          echo "│    - COMMIT_SHA=${{ env.COMMIT_SHA }}"
          echo "│    - INFRA=${{ env.INFRA }}"
          echo "│    - SITE_ENV=${{ env.SITE_ENV }}"
          echo "│    - SITE_NAME=${{ env.SITE_NAME }}"
          echo "│    - SITE_URL=${{ env.SITE_URL }}"
          echo "└────────────────────────────────────────────────────────────┘"
          echo ""

          START_TIME=$(date +%s)
          docker build -f infra/containers/Dockerfile.frontend \
            --build-arg AZURE_TENANT_ID=${{ env.AZURE_TENANT_ID }} \
            --build-arg AZURE_SUBSCRIPTION_ID=${{ env.AZURE_SUBSCRIPTION_ID }} \
            --build-arg AZURE_CLIENT_ID=${{ env.AZURE_CLIENT_ID }} \
            --build-arg COMMIT_SHA=${{ env.COMMIT_SHA }} \
            --build-arg INFRA=${{ env.INFRA }} \
            --build-arg SITE_ENV=${{ env.SITE_ENV }} \
            --build-arg SITE_URL=${{ env.SITE_URL }} \
            --build-arg SITE_NAME=${{ env.SITE_NAME }} \
            -t ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}/${{env.CONTAINER_NAME}}:${{env.CONTAINER_TAG}} .
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo ""
          echo "::notice::✅ Docker build completed in ${DURATION}s"
          echo "::endgroup::"

          # Get image size
          IMAGE_SIZE=$(docker images --format "{{.Size}}" ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}/${{env.CONTAINER_NAME}}:${{env.CONTAINER_TAG}})
          echo "📦 Image size: $IMAGE_SIZE"

          # Write to job summary
          echo "## 🐳 Docker Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Size | ${IMAGE_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container | \`${{env.CONTAINER_NAME}}:${{env.CONTAINER_TAG}}\` |" >> $GITHUB_STEP_SUMMARY

      - name: ⏫ Pushing the docker container...
        env:
          CONTAINER_NAME: ${{inputs.container_name || 'frontend/dev.arolariu'}}
          CONTAINER_TAG: ${{inputs.environment == 'production' && github.sha || 'latest'}}
        run: |
          echo "::group::⏫ Docker Push"
          echo "📤 Pushing to Azure Container Registry..."
          START_TIME=$(date +%s)
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}/${{env.CONTAINER_NAME}}:${{env.CONTAINER_TAG}}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "::notice::✅ Docker push completed in ${DURATION}s"
          echo "::endgroup::"

          echo "## ⏫ Docker Push Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Push Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | Azure Container Registry |" >> $GITHUB_STEP_SUMMARY
