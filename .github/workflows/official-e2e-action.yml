# =============================================================================
# End-to-End (E2E) Live Testing Workflow
# =============================================================================
# Newman-based live testing for frontend, backend, and CV targets.
#
# Features:
#   - Matrix execution for frontend/backend/cv
#   - Deterministic artifact naming for reports and logs
#   - Concurrency control to avoid overlapping live runs
#   - Automatic issue creation with parsed diagnostics on failure
# =============================================================================

name: "official-e2e-action"

permissions:
  contents: read

on:
  schedule:
    - cron: "17 6 * * *"

  workflow_dispatch:
    inputs:
      strict_mode:
        default: false
        description: "Enable Newman strict mode (--bail)."
        required: false
        type: boolean
      targets:
        default: "all"
        description: "Target selection for manual runs."
        options:
          - all
          - frontend
          - backend
          - cv
        required: false
        type: choice

concurrency:
  group: e2e-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    if: github.repository == 'arolariu/arolariu.ro'
    name: 📋 Prepare E2E matrix
    outputs:
      strict-mode: ${{ steps.resolve.outputs.strict_mode }}
      targets: ${{ steps.resolve.outputs.targets }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🚀 Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          cache-key-prefix: "e2e"
          dotnet-version: ""
          node-version: "24"

      - name: 🔍 Resolve run inputs
        id: resolve
        shell: bash
        run: |
          selected_targets="all"
          strict_mode="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            selected_targets="${{ github.event.inputs.targets }}"
            if [ "${{ github.event.inputs.strict_mode }}" = "true" ]; then
              strict_mode="true"
            fi
          fi

          case "$selected_targets" in
            all)
              targets='["frontend","backend","cv"]'
              ;;
            frontend|backend|cv)
              targets="[\"$selected_targets\"]"
              ;;
            *)
              echo "::error::Invalid targets input: $selected_targets"
              exit 1
              ;;
          esac

          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "strict_mode=$strict_mode" >> "$GITHUB_OUTPUT"

          {
            echo "## 🧪 E2E Live Test Configuration"
            echo ""
            echo "| Parameter | Value |"
            echo "|-----------|-------|"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Targets | $targets |"
            echo "| Strict Mode | $strict_mode |"
          } >> "$GITHUB_STEP_SUMMARY"

  e2e-live:
    if: github.repository == 'arolariu/arolariu.ro'
    name: 🧪 ${{ matrix.target }} live tests
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🚀 Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          cache-key-prefix: "e2e"
          dotnet-version: ""
          node-version: "24"

      - name: 🌡️ Backend health check
        if: matrix.target == 'backend'
        shell: bash
        run: |
          http_code=$(curl -s -o backend-health.json -w "%{http_code}" https://api.arolariu.ro/health)
          if [ "$http_code" != "200" ]; then
            echo "::error::Backend health check failed with HTTP $http_code"
            cat backend-health.json
            exit 1
          fi

      - name: 🧪 Run Newman collection
        id: run-tests
        shell: bash
        run: |
          mkdir -p e2e-logs
          start_time=$(date +%s)

          set +e
          npm run test:e2e:${{ matrix.target }} 2>&1 | tee e2e-${{ matrix.target }}.log
          exit_code=${PIPESTATUS[0]}
          set -e

          end_time=$(date +%s)
          duration=$((end_time - start_time))
          status="success"
          if [ "$exit_code" -ne 0 ]; then
            status="failure"
          fi

          echo "duration=${duration}s" >> "$GITHUB_OUTPUT"
          echo "status=$status" >> "$GITHUB_OUTPUT"

          {
            echo "### ${{ matrix.target }} E2E result"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Status | $status |"
            echo "| Duration | ${duration}s |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$exit_code" -ne 0 ]; then
            exit "$exit_code"
          fi
        env:
          E2E_TEST_AUTH_TOKEN: ${{ secrets.E2E_TEST_AUTH_TOKEN }}
          E2E_TEST_ENVIRONMENT: production
          NEWMAN_REPORT_DIR: e2e-logs
          NEWMAN_STRICT_MODE: ${{ needs.prepare.outputs.strict-mode }}

      - name: 📊 Summarize Newman metrics
        if: always()
        shell: bash
        run: |
          report_path="e2e-logs/newman-${{ matrix.target }}.json"
          if [ ! -f "$report_path" ]; then
            echo "::warning::Report not found: $report_path"
            exit 0
          fi

          node -e "const fs=require('node:fs');const p=process.argv[1];const target=process.argv[2];const r=JSON.parse(fs.readFileSync(p,'utf-8'));const stats=r?.run?.stats??{};const timings=r?.run?.timings??{};const requests=stats.requests??{};const assertions=stats.assertions??{};const totalMs=(timings.completed??0)-(timings.started??0);const summary=['','### '+target+' Newman stats','','| Metric | Value |','|--------|-------|','| Requests | '+(requests.total??0)+' total / '+(requests.failed??0)+' failed |','| Assertions | '+(assertions.total??0)+' total / '+(assertions.failed??0)+' failed |','| Runtime | '+(totalMs>0?((totalMs/1000).toFixed(2)+'s'):'N/A')+' |'];fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,summary.join('\\n')+'\\n');" "$report_path" "${{ matrix.target }}"

      - name: 🧾 Persist target status
        if: always()
        shell: bash
        run: |
          cat > "e2e-status-${{ matrix.target }}.json" <<EOF
          {
            "target": "${{ matrix.target }}",
            "status": "${{ steps.run-tests.outputs.status || 'failure' }}",
            "duration": "${{ steps.run-tests.outputs.duration || 'N/A' }}"
          }
          EOF

      - name: 📦 Upload reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: warn
          name: e2e-reports-${{ matrix.target }}
          path: |
            e2e-logs/newman-${{ matrix.target }}.json
            e2e-logs/newman-${{ matrix.target }}.xml
            e2e-logs/newman-${{ matrix.target }}-summary.md
          retention-days: 14

      - name: 📦 Upload logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: warn
          name: e2e-logs-${{ matrix.target }}
          path: |
            e2e-${{ matrix.target }}.log
            e2e-status-${{ matrix.target }}.json
            backend-health.json
          retention-days: 14

  raise-issue-on-failure:
    name: 🐛 Raise issue on failure
    needs: [prepare, e2e-live]
    if: ${{ always() && needs.e2e-live.result == 'failure' }}
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🚀 Setup workspace
        uses: ./.github/actions/setup-workspace
        with:
          cache-key-prefix: "e2e"
          dotnet-version: ""
          install-node-dependencies: "false"
          node-version: "24"

      - name: 📥 Download E2E artifacts
        uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          path: logs
          pattern: e2e-*

      - name: 🐛 Create GitHub issue for failures
        uses: actions/github-script@v8
        env:
          ARTIFACTS_DIR: logs
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SERVER_URL: ${{ github.server_url }}
          TARGETS: ${{ needs.prepare.outputs.targets }}
          WORKFLOW: ${{ github.workflow }}
        with:
          script: |
            const {execSync} = require('node:child_process');
            execSync('cd .github/scripts && npm ci', {stdio: 'inherit'});
            const {default: runLiveTestAction} = await import('${{ github.workspace }}/.github/scripts/src/runLiveTestAction.ts');
            await runLiveTestAction();
