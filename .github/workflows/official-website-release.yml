# =============================================================================
# Main Website Release Workflow
# =============================================================================
# Deploys the immutable container image produced by official-website-build.
# Automatic releases use the workflow_run head SHA and downloaded image metadata;
# manual releases require an explicit image tag for production.
# =============================================================================

name: "official-website-release"

permissions:
  actions: read # Required to download artifacts from the build workflow run
  contents: read # Required to checkout local composite actions
  id-token: write # Required for OIDC authentication with Azure

on:
  workflow_run:
    workflows: ["official-website-build"]
    types: ["completed"]
    branches: ["preview"]

  workflow_dispatch:
    inputs:
      environment:
        description: "The environment to release to."
        options:
          - "development"
          - "production"
        default: "development"
        required: true
        type: choice
      container_name:
        description: "The container image name to release."
        options:
          - "frontend/dev.arolariu"
          - "frontend/arolariu"
        default: "frontend/dev.arolariu"
        required: true
        type: choice
      image_tag:
        description: "Immutable image tag to release. Required for production manual releases."
        required: false
        default: ""
        type: string
      image_digest:
        description: "Optional image digest. When omitted, deployment uses the immutable image tag."
        required: false
        default: ""
        type: string

jobs:
  release:
    name: 🚀 Release phase (1/1)
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'arolariu/arolariu.ro' && (github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'workflow_dispatch')) }}
    environment:
      name: ${{ inputs.environment || 'development' }}
      url: ${{ steps.deploy-to-webapp.outputs.url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: 📥 Download website image metadata
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v7
        with:
          name: website-image-${{ github.event.workflow_run.head_sha }}
          path: artifacts/website-image
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: 🧾 Resolve release metadata
        id: metadata
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_CONTAINER_NAME: ${{ inputs.container_name }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_IMAGE_DIGEST: ${{ inputs.image_digest }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          MANUAL_DEFAULT_SHA: ${{ github.sha }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_run" ]; then
            metadata_file="artifacts/website-image/website-image.json"
            if [ ! -f "${metadata_file}" ]; then
              echo "::error::Missing website image metadata artifact from build workflow."
              exit 1
            fi

            image="$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(data.image);" "${metadata_file}")"
            tag="$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(data.tag);" "${metadata_file}")"
            digest="$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(data.digest);" "${metadata_file}")"
            source_sha="$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(data.sourceSha);" "${metadata_file}")"

            if [ "${source_sha}" != "${WORKFLOW_RUN_HEAD_SHA}" ]; then
              echo "::error::Image metadata SHA '${source_sha}' does not match workflow_run head SHA '${WORKFLOW_RUN_HEAD_SHA}'."
              exit 1
            fi
          else
            image="${INPUT_CONTAINER_NAME}"
            digest="${INPUT_IMAGE_DIGEST}"

            if [ "${INPUT_ENVIRONMENT}" = "production" ] && [ -z "${INPUT_IMAGE_TAG}" ]; then
              echo "::error::Production manual releases require an explicit image_tag."
              exit 1
            fi

            tag="${INPUT_IMAGE_TAG:-${MANUAL_DEFAULT_SHA}}"
          fi

          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: ⚓ Release container to Azure App Service
        id: deploy-to-webapp
        uses: ./.github/actions/azure-webapp-container-deploy
        with:
          app-name: ${{ steps.metadata.outputs.image == 'frontend/arolariu' && 'www-arolariu-ro' || 'dev-arolariu-ro' }}
          registry: ${{ secrets.AZURE_CONTAINER_REGISTRY_ADDRESS }}
          image-name: ${{ steps.metadata.outputs.image }}
          image-digest: ${{ steps.metadata.outputs.digest }}
          image-tag: ${{ steps.metadata.outputs.tag }}
          azure-client-id: ${{ secrets.AZURE_FRONTEND_MANAGED_IDENTITY_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 📊 Release summary
        run: |
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "### ✅ Release Successful" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Metric | Value |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|--------|-------|" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Deployment Time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Image | \`${{ steps.deploy-to-webapp.outputs.deployed-image }}\` |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Website URL | ${{ steps.deploy-to-webapp.outputs.url }} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "🔗 **Live URL**: ${{ steps.deploy-to-webapp.outputs.url }}" >> "${GITHUB_STEP_SUMMARY}"
