name: "official-docs-trigger"

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "sites/docs.arolariu.ro/**"
      - "sites/api.arolariu.ro/src/**"
      - "sites/exp.arolariu.ro/**"
      - "sites/arolariu.ro/src/**"
      - "packages/components/src/**"
      - "scripts/docs-*.ts"
      - "typedoc*.json"
      - "package.json"
      - "package-lock.json"
      - ".github/actions/setup-workspace/**"
      - ".github/actions/static-web-app-build-deploy/**"
      - ".github/workflows/official-docs-trigger.yml"
      - ".github/workflows/reusable-static-webapp.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment for deployment."
        options:
          - "production"
        default: "production"
        type: choice

jobs:
  deploy:
    name: 🚀 Docs static web app
    if: github.repository == 'arolariu/arolariu.ro'
    uses: ./.github/workflows/reusable-static-webapp.yml
    with:
      site-name: "docs"
      working-directory: "."
      build-command: |
        dotnet workload restore
        dotnet restore ./arolariu.slnx
        dotnet tool install --global DefaultDocumentation.Console --version 1.2.4
        export PATH="${HOME}/.dotnet/tools:${PATH}"
        python -m pip install -r sites/exp.arolariu.ro/requirements-dev.txt
        npm run docs:assemble
        npm run build:docs
      app-location: "."
      output-location: "sites/docs.arolariu.ro/build"
      environment-name: "documentation"
      site-url: "https://docs.arolariu.ro"
      dotnet-version: "10.0.x"
      python-version: "3.12"
    secrets:
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_DOCS_TOKEN }}
