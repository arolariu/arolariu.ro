name: "Static Web App Build and Deploy"
description: "Builds a static site and deploys it to Azure Static Web Apps."
author: "arolariu.ro"

inputs:
  site-name:
    description: "Short site name used for cache and summary labels."
    required: true
  working-directory:
    description: "Directory where test and build commands run."
    required: true
  build-command:
    description: "Command that produces the static site output."
    required: true
  test-command:
    description: "Optional test command to run before the build."
    required: false
    default: ""
  app-location:
    description: "Path passed to Azure Static Web Apps as the app location."
    required: true
  api-location:
    description: "Optional API output location for Azure Static Web Apps."
    required: false
    default: ""
  output-location:
    description: "Path passed to Azure Static Web Apps as the output location."
    required: true
  site-url:
    description: "Public site URL."
    required: true
  swa-token:
    description: "Azure Static Web Apps deployment token."
    required: true
  dotnet-version:
    description: ".NET SDK version to install; leave empty to skip .NET setup."
    required: false
    default: ""
  python-version:
    description: "Python version to install; leave empty to skip Python setup."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: 🚀 Setup static site workspace
      uses: ./.github/actions/setup-workspace
      with:
        node-version: "24"
        dotnet-version: ${{ inputs.dotnet-version }}
        install-dotnet-dependencies: ${{ inputs.dotnet-version != '' && 'true' || 'false' }}
        cache-key-prefix: ${{ inputs.site-name }}

    - name: 🐍 Setup Python
      if: inputs.python-version != ''
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: "pip"
        cache-dependency-path: |
          sites/exp.arolariu.ro/requirements.txt
          sites/exp.arolariu.ro/requirements-dev.txt

    - name: 🧪 Test static site
      if: inputs.test-command != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.test-command }}

    - name: 🏗️ Build static site
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.build-command }}

    - name: 🚀 Deploy static site
      uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
      with:
        azure_static_web_apps_api_token: ${{ inputs.swa-token }}
        repo_token: ${{ github.token }}
        action: "upload"
        app_location: ${{ inputs.app-location }}
        api_location: ${{ inputs.api-location }}
        output_location: ${{ inputs.output-location }}

    - name: 📊 Static site deployment summary
      shell: bash
      run: |
        echo "### ✅ ${{ inputs.site-name }} deployed" >> "${GITHUB_STEP_SUMMARY}"
        echo "" >> "${GITHUB_STEP_SUMMARY}"
        echo "🔗 **Live URL**: ${{ inputs.site-url }}" >> "${GITHUB_STEP_SUMMARY}"
