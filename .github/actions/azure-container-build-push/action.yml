name: "Azure Container Build and Push"
description: "Builds and pushes an immutable container image to Azure Container Registry."
author: "arolariu.ro"

inputs:
  registry:
    description: "Azure Container Registry login server, for example example.azurecr.io."
    required: true
  image-name:
    description: "Repository path/name inside the registry."
    required: true
  dockerfile:
    description: "Dockerfile path."
    required: true
  context:
    description: "Docker build context."
    required: false
    default: "."
  build-args:
    description: "Optional Docker build arguments."
    required: false
    default: ""
  azure-client-id:
    description: "Azure federated managed identity client ID."
    required: true
  azure-tenant-id:
    description: "Azure tenant ID."
    required: true
  azure-subscription-id:
    description: "Azure subscription ID."
    required: true

outputs:
  image:
    description: "Immutable image tag pushed to ACR."
    value: ${{ steps.metadata.outputs.image }}
  digest:
    description: "Image digest produced by Docker Buildx."
    value: ${{ steps.build.outputs.digest }}

runs:
  using: "composite"
  steps:
    - name: 🔐 Azure login
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: 🔐 Azure Container Registry login
      shell: bash
      env:
        ACR_LOGIN_SERVER: ${{ inputs.registry }}
      run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"

    - name: 🧰 Setup Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: 🧾 Compute image metadata
      id: metadata
      shell: bash
      run: |
        image="${{ inputs.registry }}/${{ inputs.image-name }}:${{ github.sha }}"
        echo "image=${image}" >> "${GITHUB_OUTPUT}"
        echo "Building ${image}"

    - name: 🐳 Build and push image
      id: build
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ steps.metadata.outputs.image }}
        labels: |
          org.opencontainers.image.source=https://github.com/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha,scope=${{ inputs.image-name }}
        cache-to: type=gha,mode=max,scope=${{ inputs.image-name }}
        provenance: true
        sbom: true
