loaders:
  - type: python
    search_path: ["."]
    packages: []
    modules:
      - main
      - models
      - api.admin
      - api.build_time
      - api.common
      - api.config
      - api.health
      - api.run_time
      - config.catalog
      - config.loader
      - config.settings
      - security.authz
      - telemetry.bootstrap
      - telemetry.settings
      - runtime.metrics

processors:
  - type: filter
    skip_empty_modules: true
  - type: smart
  - type: crossref

renderer:
  type: docusaurus
  docs_base_path: ../../sites/docs.arolariu.ro-v2/_generated/experimental
  relative_output_path: .
  relative_sidebar_path: sidebar.json
  sidebar_top_level_label: Experimental
